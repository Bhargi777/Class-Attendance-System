<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive classroom attendance tracking system">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="topbar-title">
                <span class="topbar-icon">◉</span>
                Attendance
            </div>
            <div class="topbar-date" id="dateDisplay"></div>
        </header>

        <div class="counts">
            <div class="count-box count-present">
                <span class="count-num" id="presentNum">0</span>
                <span class="count-tag">present</span>
            </div>
            <div class="count-box count-absent">
                <span class="count-num" id="absentNum">0</span>
                <span class="count-tag">absent</span>
            </div>
            <div class="count-box count-total">
                <span class="count-num" id="totalNum">0</span>
                <span class="count-tag">total</span>
            </div>
        </div>

        <div class="bar-wrap">
            <div class="bar-track">
                <div class="bar-fill" id="progressBar"></div>
            </div>
            <span class="bar-pct" id="progressText">0%</span>
        </div>

        <div class="actions">
            <button id="swapBtn" class="btn">
                ⇄ Swap sides
            </button>
            <button id="exportBtn" class="btn btn-outline">
                ⎘ Copy report
            </button>
            <button id="newDayBtn" class="btn btn-outline">
                ↻ New day
            </button>
        </div>

        <div class="board">
            <div class="board-inner">
                <div class="col" id="left-column"></div>
                <div class="divider"></div>
                <div class="col" id="right-column"></div>
            </div>
        </div>

        <div class="lists">
            <div class="list-card list-present">
                <div class="list-head">✓ Present</div>
                <div class="list-body" id="presentList">—</div>
            </div>
            <div class="list-card list-absent">
                <div class="list-head">✕ Absent</div>
                <div class="list-body" id="absentList">—</div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <footer class="foot">
            click a seat to toggle &middot; attendance tracker
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
